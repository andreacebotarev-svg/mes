# Fail2Ban configuration for CryptMessenger (PocketBase/Node.js)

[cryptmessenger-auth]
enabled = true
port = 80,443,8090
filter = cryptmessenger-auth
# Log path depends on where your app/PocketBase saves logs
logpath = /var/log/pocketbase.log
maxretry = 5
findtime = 600
bantime = 3600

# Filter definition (save this to /etc/fail2ban/filter.d/cryptmessenger-auth.conf)
# Definition of a failed login attempt in logs:
# [fail2ban-filter]
# failregex = ^.* "POST /api/auth/login" 401 .* client_ip=<HOST>
#             ^.* "POST /api/admins/auth-with-password" 401 .* client_ip=<HOST>
